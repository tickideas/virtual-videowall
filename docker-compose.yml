services:
  postgres:
    image: postgres:16-alpine
    container_name: videowall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: videowall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: videowall
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videowall"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videowall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videowall-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://videowall:${POSTGRES_PASSWORD:-changeme}@postgres:5432/videowall
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DAILY_API_KEY=${DAILY_API_KEY}
      - DAILY_DOMAIN=${DAILY_DOMAIN}
      - NEXT_PUBLIC_DAILY_DOMAIN=${NEXT_PUBLIC_DAILY_DOMAIN}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Virtual Video Wall}
      - NEXT_PUBLIC_MAX_CHURCHES=${NEXT_PUBLIC_MAX_CHURCHES:-60}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
